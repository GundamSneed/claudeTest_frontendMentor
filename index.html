<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css">

  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main class="profile-card">
    <img class="profile-card__avatar" src="./assets/images/avatar-jessica.jpeg" alt="" width="88" height="88">

    <h1 class="profile-card__name">Jessica Randall</h1>
    <p class="profile-card__location">London, United Kingdom</p>
    <p class="profile-card__bio">"Front-end developer and avid reader."</p>

    <nav aria-label="Social links">
      <ul class="profile-card__links">
        <li><a href="#" class="profile-card__link">GitHub</a></li>
        <li><a href="#" class="profile-card__link">Frontend Mentor</a></li>
        <li><a href="#" class="profile-card__link">LinkedIn</a></li>
        <li><a href="#" class="profile-card__link">Twitter</a></li>
        <li><a href="#" class="profile-card__link">Instagram</a></li>
      </ul>
    </nav>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Claude Man</a>.
  </footer>
</body>
</html>
